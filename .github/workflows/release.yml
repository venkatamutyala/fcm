name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  packages: write
  id-token: write  # Required for cosign keyless signing

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version: "1.23"
          cache: true

      - name: Install cosign
        uses: sigstore/cosign-installer@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v6
        with:
          version: latest
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Sign all release artifacts with cosign (keyless)
        run: |
          # Sign binaries
          for file in dist/fcm_linux_*/*; do
            if [ -f "$file" ]; then
              echo "Signing $file"
              cosign sign-blob --yes --output-signature "${file}.sig" --output-certificate "${file}.pem" "$file"
            fi
          done
          # Sign checksums
          if [ -f dist/checksums.txt ]; then
            cosign sign-blob --yes --output-signature dist/checksums.txt.sig --output-certificate dist/checksums.txt.pem dist/checksums.txt
          fi

      - name: Upload signatures to release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          tag="${GITHUB_REF#refs/tags/}"
          for file in dist/fcm_linux_*/*.sig dist/fcm_linux_*/*.pem dist/checksums.txt.sig dist/checksums.txt.pem; do
            if [ -f "$file" ]; then
              gh release upload "$tag" "$file" --clobber
            fi
          done

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ghcr.io/venkatamutyala/fcm:${{ github.ref_name }}
            ghcr.io/venkatamutyala/fcm:latest
          build-args: |
            VERSION=${{ github.ref_name }}

      - name: Sign Docker image with cosign (keyless)
        run: |
          cosign sign --yes ghcr.io/venkatamutyala/fcm:${{ github.ref_name }}
          cosign sign --yes ghcr.io/venkatamutyala/fcm:latest
