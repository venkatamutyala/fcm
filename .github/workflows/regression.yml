name: Regression Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      images:
        description: "Comma-separated images to test (leave empty for all)"
        required: false

permissions:
  contents: read

jobs:
  setup:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v6

      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - uses: actions/setup-go@v6
        with:
          go-version: "1.23"

      - name: Build fcm
        run: go build -ldflags "-s -w -X main.Version=test" -o fcm ./cmd/fcm

      - name: Build custom kernel
        run: |
          docker build -t fcm-kernel -f kernel/Dockerfile kernel/
          docker create --name fcm-kernel-extract fcm-kernel
          docker cp fcm-kernel-extract:/build/linux/vmlinux vmlinux-fcm
          docker rm fcm-kernel-extract
          ls -lh vmlinux-fcm

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: fcm-artifacts
          path: |
            fcm
            vmlinux-fcm

  test:
    needs: setup
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        image:
          - ubuntu-24.04
          - ubuntu-22.04
          - debian-12
          - rocky-9
          - alma-9
          - centos-stream9
          - opensuse-15.6
          - alpine-3.20
          # TODO: Enable after fixes
          # - fedora-41      # Fix: download URL 404
          # - arch           # Fix: needs BTRFS kernel module
    steps:
      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm
          ls -la /dev/kvm

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: fcm-artifacts

      - name: Set VM name
        run: |
          # Sanitize image name for use as VM name (replace dots with dashes)
          VM_NAME="test-$(echo '${{ matrix.image }}' | tr '.' '-')"
          echo "VM_NAME=$VM_NAME" >> $GITHUB_ENV
          echo "Using VM name: $VM_NAME"

      - name: Install fcm and dependencies
        run: |
          chmod +x fcm
          sudo cp fcm /usr/local/bin/fcm
          sudo apt-get update -qq
          sudo apt-get install -y -qq qemu-utils fdisk e2fsprogs mtools dosfstools

      - name: Initialize fcm
        run: sudo fcm init --yes

      - name: Install custom kernel
        run: |
          sudo cp vmlinux-fcm /var/lib/fcm/kernels/vmlinux-default
          echo "Custom kernel installed (with vfat/iso9660 support)"

      - name: Verify system
        run: sudo fcm doctor

      - name: Generate SSH key
        run: |
          ssh-keygen -t ed25519 -f ~/.ssh/id_ed25519 -N "" -q
          # Copy to root's home so sudo fcm exec can find it
          sudo mkdir -p /root/.ssh
          sudo cp ~/.ssh/id_ed25519 /root/.ssh/id_ed25519
          sudo cp ~/.ssh/id_ed25519.pub /root/.ssh/id_ed25519.pub
          sudo chmod 600 /root/.ssh/id_ed25519

      - name: Pull image
        run: sudo fcm pull ${{ matrix.image }}

      - name: "Test: create"
        run: |
          sudo fcm create ${{ env.VM_NAME }} \
            --image ${{ matrix.image }} \
            --ssh-key ~/.ssh/id_ed25519.pub
          sudo fcm list

      - name: "Test: SSH (first boot)"
        run: |
          echo "Waiting for VM to boot..."
          for i in $(seq 1 60); do
            # Try SSH
            RESULT=$(ssh -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null \
              -o IdentitiesOnly=yes -o ConnectTimeout=5 -o BatchMode=yes \
              -i ~/.ssh/id_ed25519 root@192.168.100.10 "echo OK" 2>&1) && {
              echo "SSH ready after $((i * 5))s"
              exit 0
            }
            # Every 30s, print diagnostic
            if [ $((i % 6)) -eq 0 ]; then
              echo "  Still waiting ($((i * 5))s)... ping=$(ping -c1 -W1 192.168.100.10 2>&1 | grep -c '1 received') ssh_err=$(echo $RESULT | tail -1)"
            fi
            sleep 5
          done
          echo "SSH failed after 300s"
          echo "=== Final diagnostic ==="
          ping -c1 -W2 192.168.100.10 || echo "Ping failed"
          ssh -v -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null \
            -o IdentitiesOnly=yes -o ConnectTimeout=5 \
            -i ~/.ssh/id_ed25519 root@192.168.100.10 "echo OK" 2>&1 | tail -20
          sudo tail -50 /var/lib/fcm/vms/${{ env.VM_NAME }}/console.log || true
          exit 1

      - name: "Test: exec"
        run: |
          sudo fcm exec ${{ env.VM_NAME }} -- hostname
          sudo fcm exec ${{ env.VM_NAME }} -- cat /etc/os-release

      - name: "Test: inspect"
        run: sudo fcm inspect ${{ env.VM_NAME }}

      - name: "Test: internet access"
        run: |
          IP=$(sudo cat /var/lib/fcm/vms/${{ env.VM_NAME }}/vm.json | python3 -c "import sys,json; print(json.load(sys.stdin)['ip'])")
          RESULT=$(ssh -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null \
            -o IdentitiesOnly=yes -o ConnectTimeout=10 -o BatchMode=yes \
            -i ~/.ssh/id_ed25519 root@$IP "curl -sf --max-time 10 ifconfig.me 2>/dev/null || wget -qO- --timeout=10 ifconfig.me 2>/dev/null" 2>/dev/null)
          echo "External IP: $RESULT"
          [ -n "$RESULT" ] || { echo "FAIL: no internet"; exit 1; }

      - name: "Test: DNS resolution"
        run: |
          IP=$(sudo cat /var/lib/fcm/vms/${{ env.VM_NAME }}/vm.json | python3 -c "import sys,json; print(json.load(sys.stdin)['ip'])")
          # curl a hostname to prove DNS works (ifconfig.me uses IP, this uses hostname)
          RESULT=$(ssh -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null \
            -o IdentitiesOnly=yes -o ConnectTimeout=10 -o BatchMode=yes \
            -i ~/.ssh/id_ed25519 root@$IP "curl -sf --max-time 10 http://example.com 2>/dev/null || wget -qO- --timeout=10 http://example.com 2>/dev/null" 2>/dev/null | head -1)
          [ -n "$RESULT" ] && echo "DNS OK" || { echo "FAIL: DNS not working"; exit 1; }

      - name: "Test: freeze"
        run: |
          sudo fcm freeze ${{ env.VM_NAME }}
          sudo fcm list | grep frozen

      - name: "Test: unfreeze + SSH"
        run: |
          sudo fcm unfreeze ${{ env.VM_NAME }}
          sudo fcm list | grep running
          # SSH should work immediately — VM resumes with sshd already running
          sleep 2
          ssh -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null \
            -o IdentitiesOnly=yes -o ConnectTimeout=10 -o BatchMode=yes \
            -i ~/.ssh/id_ed25519 root@192.168.100.10 "echo 'UNFREEZE SSH OK'"

      - name: "Test: data persistence across freeze"
        run: |
          IP=$(sudo cat /var/lib/fcm/vms/${{ env.VM_NAME }}/vm.json | python3 -c "import sys,json; print(json.load(sys.stdin)['ip'])")
          # Write data, freeze, unfreeze, verify data persists
          ssh -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null \
            -o IdentitiesOnly=yes -o ConnectTimeout=10 -o BatchMode=yes \
            -i ~/.ssh/id_ed25519 root@$IP "echo persist-test-data > /tmp/fcm-persist-test"
          sudo fcm freeze ${{ env.VM_NAME }}
          sudo fcm unfreeze ${{ env.VM_NAME }}
          sleep 3
          RESULT=$(ssh -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null \
            -o IdentitiesOnly=yes -o ConnectTimeout=10 -o BatchMode=yes \
            -i ~/.ssh/id_ed25519 root@$IP "cat /tmp/fcm-persist-test" 2>/dev/null)
          echo "After freeze/unfreeze: $RESULT"
          [ "$RESULT" = "persist-test-data" ] || { echo "FAIL: data lost"; exit 1; }

      - name: "Test: delete"
        run: |
          sudo fcm delete ${{ env.VM_NAME }} --force
          sudo fcm list | grep -q "No VMs" && echo "Delete OK"

      - name: Collect logs
        if: always()
        run: |
          mkdir -p /tmp/fcm-logs
          echo "=== fcm list ===" | tee /tmp/fcm-logs/summary.txt
          sudo fcm list 2>&1 | tee -a /tmp/fcm-logs/summary.txt || true
          echo "=== fcm doctor ===" | tee -a /tmp/fcm-logs/summary.txt
          sudo fcm doctor 2>&1 | tee -a /tmp/fcm-logs/summary.txt || true
          echo "=== vm.json ===" | tee -a /tmp/fcm-logs/summary.txt
          sudo cat /var/lib/fcm/vms/${{ env.VM_NAME }}/vm.json 2>/dev/null | tee -a /tmp/fcm-logs/summary.txt || true
          sudo cp /var/lib/fcm/vms/${{ env.VM_NAME }}/console.log /tmp/fcm-logs/console.log 2>/dev/null || true
          sudo journalctl -u fcm-vm-${{ env.VM_NAME }}.service --no-pager 2>/dev/null > /tmp/fcm-logs/vm-service.log || true
          sudo journalctl -u fcm-dhcp.service --no-pager -n 50 2>/dev/null > /tmp/fcm-logs/dhcp.log || true
          sudo journalctl -u fcm-bridge.service --no-pager 2>/dev/null > /tmp/fcm-logs/bridge.log || true
          sudo iptables -t nat -L -n 2>/dev/null > /tmp/fcm-logs/iptables-nat.txt || true
          sudo ip addr 2>/dev/null > /tmp/fcm-logs/ip-addr.txt || true

      - name: Upload logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: logs-${{ matrix.image }}
          path: /tmp/fcm-logs/
          retention-days: 7

      - name: Cleanup
        if: always()
        run: sudo fcm cleanup --confirm 2>/dev/null || true

  test-templates:
    needs: setup
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        template:
          - alpine
          - alpine-docker
          - alpine-dev
          - ubuntu
          - ubuntu-dev
          - debian
    steps:
      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: fcm-artifacts

      - name: Set VM name
        run: |
          VM_NAME="tpl-$(echo '${{ matrix.template }}' | tr '.' '-')"
          echo "VM_NAME=$VM_NAME" >> $GITHUB_ENV

      - name: Install fcm and dependencies
        run: |
          chmod +x fcm
          sudo cp fcm /usr/local/bin/fcm
          sudo apt-get update -qq
          sudo apt-get install -y -qq qemu-utils fdisk e2fsprogs mtools dosfstools

      - name: Initialize fcm
        run: sudo fcm init --yes

      - name: Install custom kernel
        run: sudo cp vmlinux-fcm /var/lib/fcm/kernels/vmlinux-default

      - name: Generate SSH key
        run: |
          ssh-keygen -t ed25519 -f ~/.ssh/id_ed25519 -N "" -q
          sudo mkdir -p /root/.ssh
          sudo cp ~/.ssh/id_ed25519 /root/.ssh/id_ed25519
          sudo cp ~/.ssh/id_ed25519.pub /root/.ssh/id_ed25519.pub
          sudo chmod 600 /root/.ssh/id_ed25519

      - name: "Test: create from template"
        run: |
          sudo fcm create ${{ env.VM_NAME }} \
            --template ${{ matrix.template }} \
            --ssh-key ~/.ssh/id_ed25519.pub
          sudo fcm list

      - name: "Test: SSH"
        run: |
          echo "Waiting for VM to boot..."
          for i in $(seq 1 60); do
            if ssh -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null \
              -o IdentitiesOnly=yes -o ConnectTimeout=5 -o BatchMode=yes \
              -i ~/.ssh/id_ed25519 root@192.168.100.10 "echo OK" 2>/dev/null; then
              echo "SSH ready after $((i * 5))s"
              exit 0
            fi
            sleep 5
          done
          echo "SSH failed after 300s"
          sudo tail -50 /var/lib/fcm/vms/${{ env.VM_NAME }}/console.log || true
          exit 1

      - name: "Test: Docker inside VM"
        if: matrix.template == 'ubuntu-dev'
        run: |
          IP=192.168.100.10
          # Wait for cloud-init to finish installing Docker
          echo "Waiting for Docker to be installed by cloud-init..."
          for i in $(seq 1 24); do
            if ssh -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null \
              -o IdentitiesOnly=yes -o ConnectTimeout=5 -o BatchMode=yes \
              -i ~/.ssh/id_ed25519 root@$IP "docker info" 2>/dev/null | grep -q "Server Version"; then
              echo "Docker ready after $((i * 10))s"
              break
            fi
            sleep 10
          done
          # Run nginx container
          ssh -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null \
            -o IdentitiesOnly=yes -o ConnectTimeout=10 -o BatchMode=yes \
            -i ~/.ssh/id_ed25519 root@$IP "docker run -d -p 8080:80 nginx:alpine" 2>/dev/null
          sleep 10
          # Verify host can reach the container
          curl -sf --max-time 10 http://$IP:8080 | head -3
          echo "HOST REACHED DOCKER CONTAINER"

      - name: "Test: delete"
        run: |
          sudo fcm delete ${{ env.VM_NAME }} --force
          sudo fcm list | grep -q "No VMs" && echo "Delete OK"

      - name: Collect logs
        if: always()
        run: |
          mkdir -p /tmp/fcm-logs
          sudo fcm list 2>&1 > /tmp/fcm-logs/summary.txt || true
          sudo cat /var/lib/fcm/vms/${{ env.VM_NAME }}/vm.json 2>/dev/null > /tmp/fcm-logs/vm.json || true
          sudo cp /var/lib/fcm/vms/${{ env.VM_NAME }}/console.log /tmp/fcm-logs/console.log 2>/dev/null || true
          sudo journalctl -u fcm-dhcp.service --no-pager -n 50 2>/dev/null > /tmp/fcm-logs/dhcp.log || true

      - name: Upload logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: logs-template-${{ matrix.template }}
          path: /tmp/fcm-logs/
          retention-days: 7

      - name: Cleanup
        if: always()
        run: sudo fcm cleanup --confirm 2>/dev/null || true
