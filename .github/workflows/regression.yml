name: Regression Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      images:
        description: "Comma-separated images to test (leave empty for all)"
        required: false

permissions:
  contents: read

jobs:
  setup:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - uses: actions/setup-go@v5
        with:
          go-version: "1.23"

      - name: Build fcm
        run: go build -ldflags "-s -w -X main.Version=test" -o fcm ./cmd/fcm

      - name: Build custom kernel
        run: |
          docker build -t fcm-kernel -f kernel/Dockerfile kernel/
          docker create --name fcm-kernel-extract fcm-kernel
          docker cp fcm-kernel-extract:/build/linux/vmlinux vmlinux-fcm
          docker rm fcm-kernel-extract
          ls -lh vmlinux-fcm

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: fcm-artifacts
          path: |
            fcm
            vmlinux-fcm

  test:
    needs: setup
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        image:
          - ubuntu-24.04
          - ubuntu-22.04
          - debian-12
          - rocky-9
          - alma-9
          - centos-stream9
          - opensuse-15.6
          # TODO: Enable after fixes
          # - fedora-41      # Fix: download URL 404
          # - arch           # Fix: needs BTRFS kernel module
          # - alpine-3.20   # Fix: no partition table, uses tiny-cloud
    steps:
      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm
          ls -la /dev/kvm

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: fcm-artifacts

      - name: Set VM name
        run: |
          # Sanitize image name for use as VM name (replace dots with dashes)
          VM_NAME="test-$(echo '${{ matrix.image }}' | tr '.' '-')"
          echo "VM_NAME=$VM_NAME" >> $GITHUB_ENV
          echo "Using VM name: $VM_NAME"

      - name: Install fcm and dependencies
        run: |
          chmod +x fcm
          sudo cp fcm /usr/local/bin/fcm
          sudo apt-get update -qq
          sudo apt-get install -y -qq qemu-utils fdisk e2fsprogs mtools dosfstools

      - name: Initialize fcm
        run: sudo fcm init --yes

      - name: Install custom kernel
        run: |
          sudo cp vmlinux-fcm /var/lib/fcm/kernels/vmlinux-default
          echo "Custom kernel installed (with vfat/iso9660 support)"

      - name: Verify system
        run: sudo fcm doctor

      - name: Generate SSH key
        run: ssh-keygen -t ed25519 -f ~/.ssh/id_ed25519 -N "" -q

      - name: Pull image
        run: sudo fcm pull ${{ matrix.image }}

      - name: "Test: create"
        run: |
          sudo fcm create ${{ env.VM_NAME }} \
            --image ${{ matrix.image }} \
            --ssh-key ~/.ssh/id_ed25519.pub
          sudo fcm list

      - name: "Test: SSH (first boot)"
        run: |
          echo "Waiting for VM to boot..."
          for i in $(seq 1 24); do
            if ssh -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null \
              -o IdentitiesOnly=yes -o ConnectTimeout=5 -o BatchMode=yes \
              -i ~/.ssh/id_ed25519 root@192.168.100.10 "echo OK" 2>/dev/null; then
              echo "SSH ready after $((i * 5))s"
              exit 0
            fi
            sleep 5
          done
          echo "SSH failed after 120s"
          sudo tail -50 /var/lib/fcm/vms/${{ env.VM_NAME }}/console.log || true
          exit 1

      - name: "Test: exec"
        run: |
          sudo fcm exec ${{ env.VM_NAME }} -- hostname
          sudo fcm exec ${{ env.VM_NAME }} -- cat /etc/os-release

      - name: "Test: inspect"
        run: sudo fcm inspect ${{ env.VM_NAME }}

      - name: "Test: stop + start"
        run: |
          sudo fcm stop ${{ env.VM_NAME }}
          sudo fcm list | grep stopped
          sudo fcm start ${{ env.VM_NAME }}
          sudo fcm list | grep running

      - name: "Test: SSH (after restart)"
        run: |
          echo "Waiting for VM to restart..."
          for i in $(seq 1 24); do
            if ssh -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null \
              -o IdentitiesOnly=yes -o ConnectTimeout=5 -o BatchMode=yes \
              -i ~/.ssh/id_ed25519 root@192.168.100.10 "echo OK" 2>/dev/null; then
              echo "SSH ready after $((i * 5))s"
              exit 0
            fi
            sleep 5
          done
          echo "SSH failed after 120s"
          sudo tail -50 /var/lib/fcm/vms/${{ env.VM_NAME }}/console.log || true
          exit 1

      - name: "Test: backup + restore"
        run: |
          sudo fcm backup ${{ env.VM_NAME }}
          sudo fcm backups ${{ env.VM_NAME }}

      - name: "Test: delete"
        run: |
          sudo fcm delete ${{ env.VM_NAME }} --force
          sudo fcm list | grep -q "No VMs" && echo "Delete OK"

      - name: Collect logs on failure
        if: failure()
        run: |
          echo "=== fcm list ==="
          sudo fcm list || true
          echo "=== fcm doctor ==="
          sudo fcm doctor || true
          echo "=== console.log ==="
          sudo cat /var/lib/fcm/vms/${{ env.VM_NAME }}/console.log 2>/dev/null | tail -100 || true
          echo "=== systemd status ==="
          sudo systemctl status fcm-vm-${{ env.VM_NAME }}.service 2>/dev/null || true
          echo "=== DHCP logs ==="
          sudo journalctl -u fcm-dhcp.service --no-pager -n 20 || true

      - name: Cleanup
        if: always()
        run: sudo fcm cleanup --confirm 2>/dev/null || true
